<!DOCTYPE html>
<html>
<head>
  <title>Tree Node</title>
</head>
<body>

<h2>Tree Node Test</h2>
<p>Enter edges like: A->B, B->C</p>

<textarea id="input" rows="5" cols="50"></textarea><br>
<button onclick="send()">Submit</button>

<p id="error" style="color:red;"></p>
<pre id="output"></pre>

<script>
async function send() {
  const raw = document.getElementById('input').value;
  const error = document.getElementById('error');
  const output = document.getElementById('output');

  error.innerText = "";
  output.innerText = "";

  const data = raw.split(/[\n,]/).map(s => s.trim()).filter(Boolean);

  if (data.length === 0) {
    error.innerText = "Enter something";
    return;
  }

  try {
    const res = await fetch('/bfhl', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data })
    });

    const json = await res.json();
    output.innerText = JSON.stringify(json, null, 2);

  } catch (e) {
    error.innerText = e.message;
  }
}
</script>

</body>
</html>
